<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculatrice</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculatrice">
<div class="texte">calculatrice </div>

<input id="ecran" class="ecran" type="text" disabled>

<div class="bouton">
<button class="gray" onclick="effacer()">AC</button>
<button class="gray" onclick="afficher('%')">%</button>
<button class="gray" onclick="afficher('/')">/</button>
<button class="orange" onclick="afficher('*')">x</button>

<button class="chiffre" onclick="afficher('7')">7</button>
<button class="chiffre" onclick="afficher('8')">8</button>
<button class="chiffre" onclick="afficher('9')">9</button>
<button class="orange" onclick="afficher('-')">-</button>

<button class="chiffre" onclick="afficher('4')">4</button>
<button class="chiffre" onclick="afficher('5')">5</button>
<button class="chiffre" onclick="afficher('6')">6</button>
<button class="orange" onclick="afficher('+')">+</button>

<button class="chiffre" onclick="afficher('1')">1</button>
<button class="chiffre" onclick="afficher('2')">2</button>
<button class="chiffre" onclick="afficher('3')">3</button>
<button class="orange" onclick="calculer()">=</button>

<button class="chiffre chiffre0" onclick="afficher('0')">0</button>
<button class="chiffre" onclick="afficher('.')">.</button>

</div>

<p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
